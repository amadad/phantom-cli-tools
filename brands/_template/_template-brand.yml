# Brand template
# Rename this file to <brand>-brand.yml

name: "__BRAND_NAME__"
url: "https://example.com"

handles:
  twitter: "@__BRAND_SLUG__"
  linkedin: "urn:li:organization:000000000"

platforms:
  twitter:
    max_chars: 280
    hashtags: 3
  linkedin:
    max_chars: 3000
    hashtags: 5
  instagram:
    max_chars: 2200
    hashtags: 5
  threads:
    max_chars: 500
    hashtags: 2

# Visual system
visual:
  palette:
    background: "#FDFBF7"
    primary: "#1E1B16"
    accent: "#5046E5"
    secondary: "#3D3929"
    warm: "#FCEEE3"
    dark: "#111111"
    light: "#F7F7F2"

  typography:
    headline:
      font: Alegreya
      weight: 400
      lineHeight: 1.15
      sizes: { sm: 28, md: 50, lg: 84, display: 136 }

  logo:
    light: assets/logo.svg
    colorOnLight: "#1E1B16"
    colorOnDark: "#FDFBF7"

  layouts: [split, overlay, type-only, card]
  density: moderate
  alignment: center
  background: light
  paletteRotation: 4
  variants:
    layoutWeights:
      split: 2
      overlay: 1
      card: 1
      full-bleed: 1
      type-only: 1
    density: [moderate]
    alignment: [center]
    background: [light]

  image:
    style: "__DESCRIBE_CORE_AESTHETIC__"
    mood: "__DESCRIBE_EMOTIONAL_TONE__"
    avoid: [text, logos]
    prefer: []
    palette_instructions: ""

  # Renderer constants (optional — defaults match standard behavior)
  # See docs/visual-renderer-spec.md for full reference
  # renderer:
  #   margins: { relaxed: 0.08, moderate: 0.05, tight: 0.025 }
  #   logo: { width: 0.12, height: 0.06, padding: 0.02 }
  #   layouts:
  #     split: { imageHeight: 0.55, imageWidth: 0.5, textHeight: 0.6 }
  #     overlay: { textWidth: 0.7, textHeight: 0.45 }
  #   type:
  #     eyebrowRatio: 0.38
  #     minFontSize: 20
  #   graphic:
  #     gradientAlphaBase: 0.06
  #     darkTextBacking: 0.15
