# GiveCare Brand
# Reference images: styles/
# Voice: agent/src/generate/copy.ts

name: "GiveCare"
url: "https://givecareapp.com"

handles:
  twitter: "@givecareapp"
  linkedin: "urn:li:organization:106542185"

content_pillars:
  lens: "care as infrastructure — not marketing, just: here's what's happening, here's what we saw, here's what needs fixing"
  pillars:
    - id: shipped
      label: "What we shipped"
      description: "Product, features, fixes — what GiveCare built and launched"
      voice: "Founder announcing real work. Specific, grounded, no hype."
      eval_mode: founder
      volume: loud
    - id: learned
      label: "What we learned"
      description: "From InvisibleBench, from users, from data — real findings, not opinions"
      voice: "Researcher sharing a discovery. Lead with the finding, then implications."
      eval_mode: founder
      volume: vocal
    - id: amplify
      label: "What others are doing"
      description: "Orgs, research, policy worth amplifying — signal from the field"
      voice: "Curator adding context. Credit the source, add one sharp observation."
      eval_mode: founder
      volume: whisper
    - id: broken
      label: "What's broken"
      description: "System failures, gaps, things that need building — honest critique"
      voice: "Operator naming a real problem. No victim framing. Just: here's the gap."
      eval_mode: founder
      volume: quiet

platforms:
  twitter:
    max_chars: 280
    hashtags: 3
  linkedin:
    max_chars: 3000
    hashtags: 5
  instagram:
    max_chars: 2200
    hashtags: 5
  threads:
    max_chars: 500
    hashtags: 2

# =============================================================================
# VISUAL SYSTEM
# =============================================================================
#
# Two axes. One moves, one doesn't.
#
# GRAMMAR (fixed):
#   The structural rules. Layouts, type faces, image language, content hierarchy.
#   These never change regardless of volume.
#
# VOLUME (variable):
#   A single dial — MUTE → QUIET → WHISPER → VOCAL → LOUD — that modulates
#   color, image treatment, typography scale, and graphic intensity in lockstep.
#   All four elements always obey the same volume setting.
#
# Volume maps to editorial intent:
#   Grief, loss, hard diagnosis            → mute / quiet
#   Ambivalence, exhaustion, transition    → quiet / whisper
#   Everyday care, practical support       → whisper (default)
#   Tips, tools, empowerment               → vocal
#   Milestone, launch, celebration         → loud
#
# =============================================================================

visual:

  # ---------------------------------------------------------------------------
  # GRAMMAR — fixed skeleton
  # ---------------------------------------------------------------------------

  palette:
    # Named tokens — volume zones reference these relationally, not by hex
    background: "#FDFBF7"   # warm cream
    ink:        "#1E1B16"   # near-black
    earth:      "#3D3929"   # deep warm brown
    plum:       "#3B1F2B"   # deep aubergine
    cream:      "#FCEEE3"   # warm light
    peach:      "#FFE8D6"   # pale warm
    indigo:     "#5046E5"   # primary accent
    rust:       "#C45B2A"   # warm saturated accent
    sage:       "#7A9E7E"   # cool muted accent

  typography:
    # One typeface family. Volume controls scale and weight — not the face.
    headline:
      font: Alegreya
      fontFile: assets/Alegreya-VariableFont_wght.ttf
      italic: assets/Alegreya-Italic-VariableFont_wght.ttf
      sizes: { sm: 28, md: 50, lg: 84, display: 136 }

  layouts: [split, overlay, type-only, card]
  # Layout choice is instance-level. Grammar defines what's available.

  variants:
    layoutWeights:
      split: 1
      overlay: 2
      type-only: 3
      card: 2
    density: [moderate, airy]
    alignment: [centered, left]
    background: [warm, light]

  image:
    style: >
      Semi-abstract, minimal, monumental composition with strong negative space.
      Warm terracotta, rust, sandstone, pale ochre, and soft orange palette.
      Sparse detail, broad simple shapes, reduced visual information, calm but emotionally resonant.
      Distressed print texture, fine grain, pixel breakup, horizontal tearing, scanline distortion,
      compression artifacts, raster corruption, and partial image loss. Feels like a corrupted
      modernist print or degraded editorial image — not polished CGI, not glossy, not stock-photo realism.
    mood: >
      Desolate and monumental. Geological time and digital failure collapsing into one another.
      Ancient and broken. Post-signal. Emotionally quiet, reduced, warm but strange.
      If it feels like a generic AI illustration, it is wrong.
      If it feels like a degraded editorial print — calm but strange, with warmth and restraint — it is closer.
    palette_instructions: >
      Primary: terracotta, rust, sandstone, pale ochre, sun-faded orange, clay.
      Accent (use sparingly): electric cobalt blue, deep near-black, pale warm cream.
      Avoid: bright rainbow accents, neon greens, glossy gradients, saturated purple/magenta.
    prefer:
      - broad empty fields with isolated subject
      - strong silhouette, asymmetric composition
      - wide cinematic crop with sparse horizon
      - one dominant subject or landform — not many competing elements
      - fine grain and distressed print texture
      - pixel breakup and horizontal tearing
      - scanline distortion and compression artifacts
      - raster corruption and partial image loss
      - semi-abstract rendering, reduced detail, modernist framing
    avoid:
      - crowded scenes or many small objects
      - busy interiors or detailed lifestyle scenes
      - complex environmental storytelling in one frame
      - human figures, faces, hands (unless compositionally essential and semi-abstract)
      - hyperreal, glossy, ultra-detailed rendering
      - cinematic blockbuster or luxury editorial feel
      - 3D render or product rendering aesthetic
      - text, signage, UI, logos in image
      - polished stock photography staging
    negative_prompt: >
      no text, no signage, no UI, no logos, no polished CGI, no glossy rendering,
      no busy background, no stock-photo staging, no excessive props, no decorative clutter
    distortion_level: medium
    subjects:
      - desert landscape with sandstone cliffs and sparse scrub
      - solitary chair as sculptural semi-abstract object
      - bed or simple resting place
      - caregiving hands as semi-abstract warm-toned forms
      - doorway or threshold as architectural form
      - mobile phone as isolated semi-abstract object
      - medicine bottle or pill organizer as still life
      - sparse hallway or waiting room

  # ---------------------------------------------------------------------------
  # VOLUME ZONES — the moving part
  # Each zone is a fully coordinated preset. Elements never mix zones.
  # ---------------------------------------------------------------------------

  volume_zones:

    mute:
      intent: "hardest content — loss, grief, crisis"
      color:
        field: ink          # near-black ground
        text: background    # cream on near-black
        accent: earth       # single warm dark accent, barely distinct
      image:
        treatment: dark     # recessive, heavily cropped, tinted to field color
        saturation: low
      type:
        weight: 300
        size: sm
        gravity: bottom     # text sinks — heavy, grounded
        contrast: low       # text and field close in value — quiet presence
      graphic:
        channels: 1         # monochrome — single palette channel

    quiet:
      intent: "sustained difficulty — exhaustion, overwhelm, long haul"
      color:
        field: plum         # deep aubergine ground
        text: peach
        accent: earth
      image:
        treatment: subdued  # visible but palette-tinted, color suppressed
        saturation: low-mid
      type:
        weight: 400
        size: sm-md
        gravity: bottom     # weighted, grounded
        contrast: moderate
      graphic:
        channels: 1         # still single channel, tinted to palette

    whisper:
      intent: "in-between — ambivalence, transition, most everyday content"
      color:
        field: cream        # light ground emerging
        text: plum
        accent: earth
      image:
        treatment: balanced # natural tone, more breathing room, texture prominent
        saturation: mid
      type:
        weight: 400
        size: md
        gravity: center     # balanced, everyday
        contrast: clear
        note: "italic serif for pull quotes — hierarchy sharpens here"
      graphic:
        channels: 2         # duotone — field and text colors

    vocal:
      intent: "practical support, tools, tips, empowerment"
      color:
        field: background   # warm cream ground
        text: ink
        accent: indigo      # one strong accent — restrained even at high energy
      image:
        treatment: prominent  # natural color, hero placement within tile
        saturation: mid-high
      type:
        weight: 600
        size: lg
        gravity: top        # direct, purposeful
        contrast: high
      graphic:
        channels: 3         # near-natural — color forms visible

    loud:
      intent: "milestone, launch, celebration"
      color:
        field: background
        text: ink
        accents: [indigo, rust, sage]   # up to 3 accents active simultaneously
      image:
        treatment: hero     # full-bleed, full saturation, maximum presence
        saturation: high
      type:
        weight: 700
        size: display
        gravity: center     # impactful, centered
        contrast: high
      graphic:
        channels: full      # full palette active

  default_volume: whisper   # editorial home base — most GiveCare content lives here

  logo:
    light: assets/logo.svg
    colorOnLight: "#54340E"
    colorOnDark: "#FFE8D6"
    # Logo on social platform assets = redundant (handle/profile IS the brand).
    # Only use logo on standalone shareable graphics (blog OG, press kit, etc.)
    social: false
